<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Фон -->
  <rect width="64" height="64" rx="12" fill="#2E5FA3"/>
  <!-- Рама окна -->
  <rect x="9" y="9" width="46" height="46" rx="4" stroke="white" stroke-width="3.5" fill="none"/>
  <!-- Горизонтальный импост -->
  <line x1="9" y1="32" x2="55" y2="32" stroke="white" stroke-width="3"/>
  <!-- Вертикальный импост -->
  <line x1="32" y1="9" x2="32" y2="55" stroke="white" stroke-width="3"/>
  <!-- Ручка окна (правый верхний квадрант) -->
  <rect x="36" y="27.5" width="7" height="3" rx="1.5" fill="white"/>
  <rect x="41" y="24.5" width="3" height="3.5" rx="1" fill="white"/>
</svg>
